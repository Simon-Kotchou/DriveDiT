// ============================================================================
// PRODUCTION Capture Profile Configuration
// ============================================================================
//
// Full-featured configuration for production ML training data.
// Suitable for: Final dataset creation, large-scale data collection
//
// Data Captured:
//   - Full vehicle telemetry (high precision)
//   - High-resolution depth maps (128x96)
//   - Complete scene enumeration
//   - Multi-camera capture support
//   - Binary output with compression
//
// WARNING: High performance impact and storage requirements
//
// Estimated Performance Impact: High (30-50% CPU)
// Estimated Storage: ~5MB/minute per vehicle
// ============================================================================

CaptureProfileConfig {
    // Profile identification
    name "production"
    version "1.0.0"
    description "Full production capture for ML training"

    // Global settings
    captureEnabled 1
    captureIntervalMs 50     // 20 Hz capture rate
    autoStartCapture 0       // Manual start for production runs

    // Component enable/disable
    components {
        MLDataCollector {
            enabled 1
            verboseLogging 0
            captureScreenshots 1
            progressLogInterval 200
        }

        DepthRaycaster {
            enabled 1
            horizontalResolution 128
            verticalResolution 96
            maxDepth 1000.0
            minDepth 0.3
            horizontalFOV 90.0
            verticalFOV 70.0
            normalizeDepth 1
            writeRawFiles 1
        }

        SceneEnumerator {
            enabled 1
            maxDistance 500.0
            trackVehicles 1
            trackCharacters 1
            trackStaticObjects 1
            trackVegetation 0
            maxObjectsPerFrame 100
        }

        BinarySerializer {
            enabled 1
            outputFormat "RAW_BINARY"
            enableCompression 1
            includeHeaders 1
        }

        MultiCameraRig {
            enabled 1
            cameraCount 3
            // Front, left-45, right-45
            cameraAngles "0,45,-45"
            cameraFOVs "90,70,70"
        }
    }

    // Output settings
    output {
        basePath "$profile:DriveDiT_Captures"
        sessionPrefix "production"
        csvOutput 1
        binaryOutput 1
        compressOutput 1
    }

    // Performance limits
    performance {
        maxVehicles 10
        maxFrameTimeMs 30
        dropFramesOnOverload 0    // No frame drops in production
    }

    // Depth capture settings
    depth {
        captureEveryNFrames 1
        outputFormat "binary"
    }

    // Scene enumeration settings
    scene {
        captureEveryNFrames 1
        outputFormat "binary"
    }

    // Quality assurance
    qa {
        validateFrames 1
        checksumOutput 1
        logDroppedFrames 1
        alertOnErrors 1
    }
}
