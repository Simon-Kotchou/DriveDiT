// ============================================================================
// MINIMAL Capture Profile Configuration
// ============================================================================
//
// Lightweight configuration for basic telemetry capture.
// Suitable for: Initial testing, low-resource systems, long recordings
//
// Data Captured:
//   - Vehicle telemetry (position, orientation, controls)
//   - Basic timing information
//
// NOT Captured:
//   - Depth maps
//   - Scene enumeration
//   - Binary serialization
//
// Estimated Performance Impact: Very Low (<5% CPU)
// Estimated Storage: ~50KB/minute per vehicle
// ============================================================================

CaptureProfileConfig {
    // Profile identification
    name "minimal"
    version "1.0.0"
    description "Minimal telemetry-only capture profile"

    // Global settings
    captureEnabled 1
    captureIntervalMs 200    // 5 Hz capture rate
    autoStartCapture 1

    // Component enable/disable
    components {
        MLDataCollector {
            enabled 1
            verboseLogging 0
            captureScreenshots 0
            progressLogInterval 1000
        }

        DepthRaycaster {
            enabled 0
        }

        SceneEnumerator {
            enabled 0
        }

        BinarySerializer {
            enabled 0
        }

        MultiCameraRig {
            enabled 0
        }
    }

    // Output settings
    output {
        basePath "$profile:DriveDiT_Captures"
        sessionPrefix "minimal"
        csvOutput 1
        binaryOutput 0
        compressOutput 0
    }

    // Performance limits
    performance {
        maxVehicles 3
        maxFrameTimeMs 5
        dropFramesOnOverload 1
    }
}
