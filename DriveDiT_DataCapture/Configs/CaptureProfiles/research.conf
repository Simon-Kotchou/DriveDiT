// ============================================================================
// RESEARCH Capture Profile Configuration
// ============================================================================
//
// Balanced configuration for ML research and development.
// Suitable for: Model development, ablation studies, dataset creation
//
// Data Captured:
//   - Full vehicle telemetry
//   - Depth maps (64x48 resolution)
//   - Scene object enumeration
//   - Structured binary output
//
// Estimated Performance Impact: Moderate (10-20% CPU)
// Estimated Storage: ~500KB/minute per vehicle
// ============================================================================

CaptureProfileConfig {
    // Profile identification
    name "research"
    version "1.0.0"
    description "Research-grade capture with depth and scene data"

    // Global settings
    captureEnabled 1
    captureIntervalMs 100    // 10 Hz capture rate
    autoStartCapture 1

    // Component enable/disable
    components {
        MLDataCollector {
            enabled 1
            verboseLogging 1
            captureScreenshots 0
            progressLogInterval 500
        }

        DepthRaycaster {
            enabled 1
            horizontalResolution 64
            verticalResolution 48
            maxDepth 500.0
            minDepth 0.5
            horizontalFOV 90.0
            verticalFOV 70.0
            normalizeDepth 1
            writeRawFiles 1
        }

        SceneEnumerator {
            enabled 1
            maxDistance 200.0
            trackVehicles 1
            trackCharacters 1
            trackStaticObjects 0
            trackVegetation 0
            maxObjectsPerFrame 50
        }

        BinarySerializer {
            enabled 1
            outputFormat "STRUCTURED"
            enableCompression 0
            includeHeaders 1
        }

        MultiCameraRig {
            enabled 0
        }
    }

    // Output settings
    output {
        basePath "$profile:DriveDiT_Captures"
        sessionPrefix "research"
        csvOutput 1
        binaryOutput 1
        compressOutput 0
    }

    // Performance limits
    performance {
        maxVehicles 5
        maxFrameTimeMs 20
        dropFramesOnOverload 1
    }

    // Depth capture settings
    depth {
        captureEveryNFrames 1    // Every frame
        outputFormat "csv"
    }

    // Scene enumeration settings
    scene {
        captureEveryNFrames 5    // Every 5th frame
        outputFormat "csv"
    }
}
